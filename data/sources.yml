# People page fields (exported to data/members.json for people.html):
#   role            – e.g. "Full Professor", "PhD Student"
#   bio             – short research bio
#   photo           – filename under assets/img/ (leave blank for placeholder)
#   website         – personal or academic homepage (optional)
#   pub_name        – name as it appears in publication author lists (e.g. "A. Rossi")
#                     if absent, falls back to `name`

